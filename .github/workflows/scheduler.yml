name: Content Scheduler

on:
  schedule:
    # 02:00 and 04:00 UTC daily. Goal: content in the approval queue before 8am
    # London (07:00 UTC in BST, 08:00 UTC in GMT), with plenty of slack for
    # GitHub Actions' scheduling delay. The 04:00 run is a self-skipping catch-up:
    # after a successful 02:00 run the slot's topic is already generated / pending
    # review, so it only does work if the first run missed.
    - cron: '0 2 * * *'
    - cron: '0 4 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI (useful for testing)

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit generated files back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install dependencies
        run: poetry install --no-root

      - name: Run scheduler
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-sonnet-4-6
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OPERATOR_EMAIL: ${{ secrets.OPERATOR_EMAIL }}
        run: poetry run python scheduler.py

      - name: Commit generated content
        if: always()   # still commit successful articles even if the run is marked failed
        run: |
          git config user.name "Content Factory Bot"
          git config user.email "bot@content-factory.ai"
          git add content_factory/generated/ content_factory/topics/ content_factory/requests/ content_factory/artifacts/
          git diff --staged --quiet && echo "Nothing to commit" || git commit -m "chore: scheduled content $(date +%Y-%m-%d)"
          git push
